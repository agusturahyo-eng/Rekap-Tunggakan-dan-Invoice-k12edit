<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Rekap Tunggakan & Invoice ULP Tulung</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body{background:#f4f6f9; font-family: sans-serif;}
.clickable{cursor:pointer; user-select: none;}
/* Warna selang-seling kustom agar lebih kontras */
.table-striped tbody tr:nth-of-type(odd) {
    background-color: rgba(0, 0, 0, 0.03);
}
.table-striped tbody tr:nth-of-type(even) {
    background-color: #ffffff;
}
tr:hover{background-color: #eef3ff !important;}
.table-primary th:hover { background-color: #0d6efd !important; color: white; }
.card.highlight { border: 2px solid #0d6efd; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
.card-body p { margin-bottom: 2px; line-height: 1.2; font-size: 0.85rem; }

/* Tambahan CSS untuk tabel rekap baru (mirip gambar) */
.table-rekap th, .table-rekap td {
    vertical-align: middle;
    text-align: center; /* Default rata tengah untuk tabel rekap */
    white-space: nowrap;
    border: 1px solid #dee2e6;
}
.bg-dark-0 { background-color: #000 !important; color: #555 !important; }
.bg-lunas-1 { background-color: #0d47a1 !important; color: white; }
.bg-lunas-2 { background-color: #1976d2 !important; color: white; }
.bg-lunas-3 { background-color: #03a9f4 !important; color: black; }
.bg-lunas-high { background-color: #ffeb3b !important; color: black; font-weight: bold; }
.freeze-col {
    position: sticky;
    left: 0;
    background-color: #fff;
    z-index: 1;
    box-shadow: 2px 0 5px rgba(0,0,0,0.1);
}
</style>
</head>
<body>
<div class="container-fluid my-3">
<ul class="nav nav-tabs mb-3">
  <li class="nav-item"><a class="nav-link active" id="tab-lembar1" onclick="loadSheet('lembar1')">Lembar 1</a></li>
  <li class="nav-item"><a class="nav-link" id="tab-lembar2" onclick="loadSheet('lembar2')">Lembar 2</a></li>
  <li class="nav-item"><a class="nav-link" id="tab-lembar3" onclick="loadSheet('lembar3')">Lembar 3</a></li>
  <li class="nav-item"><a class="nav-link" id="tab-invoice" onclick="loadSheet('invoice')">Invoice</a></li>
</ul>
<h4 class="text-center text-primary mb-3">⚡ Rekap Tunggakan & Invoice</h4>
<h4 class="text-center text-primary mb-3"> ULP Tulung</h4>
<button id="backBtn" class="btn btn-secondary btn-sm mb-2 d-none">⬅ Kembali</button>
<div id="view"></div>
</div>

<script>
const { jsPDF } = window.jspdf;
const SHEETS = {
  lembar1: {url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vR0oO36v0vrge07HwX1zLsrGfuUxElZ3becef4DFHLNxsz2Lrohya5oThpvmkjzsNBF3_9hSdq0q4Ko/pub?gid=354207978&single=true&output=csv"},
  lembar2: {url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vR0oO36v0vrge07HwX1zLsrGfuUxElZ3becef4DFHLNxsz2Lrohya5oThpvmkjzsNBF3_9hSdq0q4Ko/pub?gid=311394824&single=true&output=csv"},
  lembar3: {url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vR0oO36v0vrge07HwX1zLsrGfuUxElZ3becef4DFHLNxsz2Lrohya5oThpvmkjzsNBF3_9hSdq0q4Ko/pub?gid=654408403&single=true&output=csv"},
  invoice: {url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vR0oO36v0vrge07HwX1zLsrGfuUxElZ3becef4DFHLNxsz2Lrohya5oThpvmkjzsNBF3_9hSdq0q4Ko/pub?gid=1657322319&single=true&output=csv"}
};

let allData = [], currentDetail = [], currentTitle = "", currentPetugas = "Semua", currentSheet = "lembar1";
let historyStack = [], sortState = { key: null, asc: true };

const parseIDR = (val) => {
  if (!val) return 0;
  let clean = String(val).replace(/[^0-9,-]/g, '').split(',')[0];
  return parseFloat(clean) || 0;
};

function getStatusLunas(r) {
  const valRaw = (r['tgl_lunas'] || r['Tgl Lunas'] || r['tgl lunas'] || "").toString().trim();
  const isBelum = valRaw === "" || valRaw === "-" || valRaw === "0" || valRaw.toUpperCase().includes("BELUM");
  return { isLunas: !isBelum, tgl: isBelum ? "BELUM LUNAS" : valRaw };
}

// FUNGSI BARU UNTUK PARSING TANGGAL (SUDAH DIUPDATE)
function parseTgl(tglStr) {
  if (!tglStr) return 0;
  
  if (!isNaN(tglStr)) return parseInt(tglStr, 10);

  const parts = tglStr.split(/[\/\- ]/); 
  if (parts.length >= 3) {
    let day = parseInt(parts[0], 10);
    let month = parseInt(parts[1], 10) - 1; 
    let year = parseInt(parts[2], 10);
    if (year < 100) year += 2000; 
    return new Date(year, month, day).getTime();
  }
  
  let d = new Date(tglStr).getTime();
  return isNaN(d) ? 0 : d;
}

function getDayFromTgl(tglStr) {
    if (!tglStr || tglStr === "BELUM LUNAS") return null;
    const parts = tglStr.split(/[\/\- ]/);
    if (parts.length > 0) {
        let d = parseInt(parts[0], 10);
        if (!isNaN(d)) return d;
    }
    return null;
}

function loadSheet(k) {
  currentSheet = k; historyStack = []; currentPetugas = "Semua"; 
  document.querySelectorAll(".nav-link").forEach(t => t.classList.remove("active"));
  document.getElementById("tab-" + k).classList.add("active");
  view.innerHTML = "<p class='text-center'>Memuat data...</p>";
  fetch(SHEETS[k].url).then(r => r.text()).then(csv => {
    allData = Papa.parse(csv, { header: true, skipEmptyLines: true, transformHeader: h => h.trim() }).data;
    renderPetugas();
  });
}

function pushView(fn) { historyStack.push(fn); backBtn.classList.remove("d-none"); }
backBtn.onclick = () => {
  if (historyStack.length > 0) historyStack.pop()();
  if (historyStack.length === 0) { backBtn.classList.add("d-none"); renderPetugas(); }
};

function renderPetugas() {
  const map = {}; 
  
  let startDay = 1, endDay = 31;
  if (currentSheet === 'lembar1') {
      startDay = 21;
      endDay = 31;
  } else if (currentSheet === 'invoice') {
      startDay = 1;
      endDay = 20;
  }

  allData.forEach(r => {
    let pName = r.petugas || "Tanpa Nama";
    let koordinator = r.koordinator || ""; 
    let kode = r.kode || "";               
    let target = parseInt(r.target) || 0;  
    
    let status = getStatusLunas(r);
    let rp = parseIDR(r.jumlah);

    if (!map[pName]) {
      map[pName] = { 
          koordinator: koordinator, kode: kode, target: target,
          j_total: 0, rp_total: 0, 
          j_sisa: 0, rp_sisa: 0, 
          lunas_harian: {} 
      };
    }

    map[pName].j_total++;
    map[pName].rp_total += rp;

    if (status.isLunas) {
        let hari = getDayFromTgl(status.tgl);
        if (hari !== null && hari >= startDay && hari <= endDay) {
            map[pName].lunas_harian[hari] = (map[pName].lunas_harian[hari] || 0) + 1;
        }
    } else {
        map[pName].j_sisa++;
        map[pName].rp_sisa += rp;
    }
  });

  const sorted = Object.keys(map).sort().map(p => ({name: p, ...map[p]}));

  let h = `<div class="table-responsive" style="max-height: 75vh;">
    <table class="table table-sm table-rekap" style="font-size: 0.75rem;">
      <thead style="background-color: #4dd0e1; position: sticky; top: 0; z-index: 2;">
        <tr>
          <th rowspan="2" class="align-middle">NO</th>
          <th rowspan="2" class="align-middle">KOORDINATOR</th>
          <th rowspan="2" class="align-middle">KODE</th>
          <th rowspan="2" class="align-middle freeze-col">PETUGAS</th>
          <th colspan="2">TOTAL SALDO</th>
          <th colspan="2">SALDO SAAT INI</th>
          <th rowspan="2" class="align-middle">TARGET HARI INI</th>
          <th colspan="${endDay - startDay + 1}">JUMLAH LUNAS TANGGAL</th>
          <th rowspan="2" class="align-middle">PROGRES TOTAL</th>
          <th rowspan="2" class="align-middle">TANGGAL NIHIL</th>
        </tr>
        <tr>
          <th>LEMBAR</th><th class="text-middle">RUPIAH</th>
          <th>LEMBAR</th><th class="text-middle">RUPIAH</th>`;
          
  for (let i = startDay; i <= endDay; i++) {
      h += `<th>${i}</th>`;
  }
  
  h += `</tr></thead><tbody>`;

  let no = 1;
  let sumTotalLbr = 0, sumTotalRp = 0, sumSisaLbr = 0, sumSisaRp = 0;
  let sumHarian = {};

  sorted.forEach(p => { 
    let progress = 0;
    if (p.j_total > 0) {
        progress = Math.round(((p.j_total - p.j_sisa) / p.j_total) * 100);
    }
    
    sumTotalLbr += p.j_total;
    sumTotalRp += p.rp_total;
    sumSisaLbr += p.j_sisa;
    sumSisaRp += p.rp_sisa;

    // --- LOGIKA WARNA ---
    let progBgColor = "";
    let progTxtColor = "";
    if (progress >= 0 && progress <= 20) { progBgColor = "black"; progTxtColor = "white"; }
    else if (progress > 20 && progress <= 60) { progBgColor = "red"; progTxtColor = "white"; }
    else if (progress > 60 && progress <= 90) { progBgColor = "yellow"; progTxtColor = "black"; }
    else if (progress > 90 && progress < 100) { progBgColor = "green"; progTxtColor = "black"; }
    else if (progress >= 100) { progBgColor = "darkblue"; progTxtColor = "white"; }

    let rowHtml = `<tr class="clickable" onclick="openPetugas('${p.name}')">
      <td class="text-center">${no++}</td>
      <td class="text-start">${p.koordinator}</td>
      <td class="text-center">${p.kode}</td>
      <td class="text-center freeze-col fw-bold">${p.name}</td>
      <td class="text-center" style="background-color: #fff9c4;">${p.j_total}</td>
      <td class="text-end" style="background-color: #fff9c4;">Rp ${p.rp_total.toLocaleString("id-ID")}</td>
      <td class="text-center" style="background-color: ${progBgColor}; color: ${progTxtColor};">${p.j_sisa}</td>
      <td class="text-end" style="background-color: ${progBgColor}; color: ${progTxtColor};">Rp ${p.rp_sisa.toLocaleString("id-ID")}</td>
      <td class="text-center">${p.target}</td>`;

    for (let i = startDay; i <= endDay; i++) {
        let val = p.lunas_harian[i] || 0;
        sumHarian[i] = (sumHarian[i] || 0) + val;
        
        let colorClass = "bg-dark-0"; 
        if (val === 1) colorClass = "bg-lunas-1";
        else if (val === 2) colorClass = "bg-lunas-2";
        else if (val >= 3 && val <= 5) colorClass = "bg-lunas-3";
        else if (val > 5) colorClass = "bg-lunas-high";

        rowHtml += `<td class="text-center ${colorClass}">${val}</td>`;
    }

    rowHtml += `
      <td class="text-center" style="background-color: ${progBgColor}; color: ${progTxtColor}; font-weight: bold;">${progress}%</td>
      <td class="text-center">${p.j_sisa === 0 ? 'NIHIL' : 'BELUM'}</td>
    </tr>`; 
    h += rowHtml;
  });

  let totalProgress = Math.round(((sumTotalLbr - sumSisaLbr) / sumTotalLbr) * 100) || 0;

  // --- LOGIKA WARNA UNTUK JUMLAH GLOBAL ---
  let totBgColor = "";
  let totTxtColor = "";
  if (totalProgress >= 0 && totalProgress <= 20) { totBgColor = "black"; totTxtColor = "white"; }
  else if (totalProgress > 20 && totalProgress <= 60) { totBgColor = "red"; totTxtColor = "white"; }
  else if (totalProgress > 60 && totalProgress <= 90) { totBgColor = "yellow"; totTxtColor = "black"; }
  else if (totalProgress > 90 && totalProgress < 100) { totBgColor = "green"; totTxtColor = "black"; }
  else if (totalProgress >= 100) { totBgColor = "darkblue"; totTxtColor = "white"; }

  h += `<tr class="fw-bold" style="background-color: #80deea; cursor: pointer;" onclick="openGlobal()">
      <td colspan="4" class="text-center freeze-col" style="background-color: #80deea;">JUMLAH</td>
      <td class="text-center">${sumTotalLbr}</td><td class="text-end">Rp ${sumTotalRp.toLocaleString("id-ID")}</td>
      <td class="text-center" style="background-color: ${totBgColor}; color: ${totTxtColor};">${sumSisaLbr}</td>
      <td class="text-end" style="background-color: ${totBgColor}; color: ${totTxtColor};">Rp ${sumSisaRp.toLocaleString("id-ID")}</td>
      <td></td>`;
      
  for (let i = startDay; i <= endDay; i++) {
      h += `<td class="text-center">${sumHarian[i] || 0}</td>`;
  }
  
  h += `<td class="text-center" style="background-color: ${totBgColor}; color: ${totTxtColor};">${totalProgress}%</td><td></td></tr>`;
  view.innerHTML = h + `</tbody></table></div>`;
}

function openPetugas(p) {
  currentPetugas = p; pushView(renderPetugas);
  const data = allData.filter(r => r.petugas === p);
  const lunas = data.filter(r => getStatusLunas(r).isLunas);
  const belum = data.filter(r => !getStatusLunas(r).isLunas);
  const byDate = {};
  
  lunas.forEach(r => { 
    let t = getStatusLunas(r).tgl;
    byDate[t] = byDate[t] || {j: 0, rp: 0}; 
    byDate[t].j++; byDate[t].rp += parseIDR(r.jumlah); 
  });
  
  let h = `<h6 class="text-primary fw-bold">Petugas: ${p}</h6><div class="table-responsive"><table class="table table-sm table-bordered table-striped"><thead class="table-success text-center"><tr><th class="text-start">Tanggal Lunas</th><th class="text-center">Plg</th><th class="text-end">Total Rp</th></tr></thead><tbody>`;
  if (belum.length > 0) h += `<tr class="clickable" onclick="detailBelum()"><td class="text-start">BELUM LUNAS</td><td class="text-center">${belum.length}</td><td class="text-end">${belum.reduce((a,b)=>a+parseIDR(b.jumlah),0).toLocaleString("id-ID")}</td></tr>`;
  
  Object.keys(byDate).sort((a,b) => parseTgl(a) - parseTgl(b)).forEach(t => { h += `<tr class="clickable" onclick="detailLunas('${t}')"><td class="text-start">${t}</td><td class="text-center">${byDate[t].j}</td><td class="text-end">${byDate[t].rp.toLocaleString("id-ID")}</td></tr>`; });
  
  view.innerHTML = h + `</tbody></table></div>`;
}

function openGlobal() {
  currentPetugas = "Semua"; pushView(renderPetugas);
  const lunas = allData.filter(r => getStatusLunas(r).isLunas);
  const belum = allData.filter(r => !getStatusLunas(r).isLunas);
  const byDate = {};
  lunas.forEach(r => { 
    let t = getStatusLunas(r).tgl;
    byDate[t] = byDate[t] || {j: 0, rp: 0}; 
    byDate[t].j++; byDate[t].rp += parseIDR(r.jumlah); 
  });
  let h = `<h6 class="text-primary fw-bold">Semua Petugas</h6><div class="table-responsive"><table class="table table-sm table-bordered table-striped"><thead class="table-success text-center"><tr><th class="text-start">Tanggal Lunas</th><th class="text-center">Plg</th><th class="text-end">Total Rp</th></tr></thead><tbody>`;
  if (belum.length > 0) h += `<tr class="clickable" onclick="detailBelum()"><td class="text-start">BELUM LUNAS</td><td class="text-center">${belum.length}</td><td class="text-end">${belum.reduce((a,b)=>a+parseIDR(b.jumlah),0).toLocaleString("id-ID")}</td></tr>`;
  
  Object.keys(byDate).sort((a,b) => parseTgl(a) - parseTgl(b)).forEach(t => { h += `<tr class="clickable" onclick="detailGlobalLunas('${t}')"><td class="text-start">${t}</td><td class="text-center">${byDate[t].j}</td><td class="text-end">${byDate[t].rp.toLocaleString("id-ID")}</td></tr>`; });
  
  view.innerHTML = h + `</tbody></table></div>`;
}

function detailLunas(t) { currentTitle = `Lunas_${t}`; currentDetail = allData.filter(r => r.petugas === currentPetugas && getStatusLunas(r).isLunas && getStatusLunas(r).tgl === t); pushView(()=>openPetugas(currentPetugas)); renderDetail(); }
function detailBelum() { currentTitle = "Belum_Lunas"; const p = currentPetugas; currentDetail = allData.filter(r => (p === "Semua" ? true : r.petugas === p) && !getStatusLunas(r).isLunas); pushView(()=>(p==="Semua"?openGlobal():openPetugas(p))); renderDetail(); }
function detailGlobalLunas(t) { currentTitle = `Global_Lunas_${t}`; currentDetail = allData.filter(r => getStatusLunas(r).isLunas && getStatusLunas(r).tgl === t); pushView(openGlobal); renderDetail(); }

function renderDetail() {
  sortState = { key: null, asc: true };
  view.innerHTML = `<h6 class="text-center fw-bold small text-uppercase">${currentTitle.replace(/_/g,' ')}</h6><div class="d-flex mb-2 gap-1"><input id="search" class="form-control form-control-sm" placeholder="Cari..."><button class="btn btn-success btn-sm" onclick="exportExcel()">XLSX</button></div><div id="tableArea"></div>`;
  document.getElementById("search").oninput = e => {
    const t = e.target.value.toLowerCase();
    drawTable(currentDetail.filter(r => Object.values(r).some(v => String(v).toLowerCase().includes(t))));
  };
  drawTable(currentDetail);
}

function drawTable(data) {
  window.triggerSort = (key) => {
    if (sortState.key === key) sortState.asc = !sortState.asc; else { sortState.key = key; sortState.asc = true; }
    const sorted = [...data].sort((a, b) => {
      let v1 = a[key] || "", v2 = b[key] || "";
      if (key === 'jumlah') return sortState.asc ? parseIDR(v1) - parseIDR(v2) : parseIDR(v2) - parseIDR(v1);
      return sortState.asc ? String(v1).localeCompare(String(v2), undefined, {numeric: true}) : String(v2).localeCompare(String(v1), undefined, {numeric: true});
    });
    drawTable(sorted);
  };
  const icon = (k) => sortState.key === k ? (sortState.asc ? ' ▲' : ' ▼') : '';
  let h = `<div class="table-responsive"><table class="table table-sm table-bordered table-striped" style="font-size:0.7rem"><thead class="table-primary text-nowrap"><tr><th class="clickable text-start" onclick="triggerSort('idpel')">IDPEL${icon('idpel')}</th><th class="clickable text-start" onclick="triggerSort('nama')">Nama${icon('nama')}</th><th class="clickable text-center" onclick="triggerSort('koked')">Koked${icon('koked')}</th><th class="clickable text-end" onclick="triggerSort('jumlah')">Rp${icon('jumlah')}</th></tr></thead><tbody>`;
  data.forEach(r => { h += `<tr class="clickable" onclick="showCardsByData('${r.idpel}')"><td class="text-start">${r.idpel}</td><td class="text-start">${r.nama}</td><td class="text-center">${r.koked}</td><td class="text-end">${parseIDR(r.jumlah).toLocaleString("id-ID")}</td></tr>`; });
  document.getElementById("tableArea").innerHTML = h + `</tbody></table></div>`;
}

function showCardsByData(id) {
  pushView(renderDetail);
  let h = "";
  currentDetail.forEach(r => {
    h += `<div class="card mb-2 ${r.idpel === id?'highlight':''}" id="card-${r.idpel}"><div class="card-body p-2">
      <div class="d-flex justify-content-between"><b>${r.nama}</b> <span class="badge bg-light text-dark">${r.koked}</span></div>
      <p class="text-muted mb-1">${r.idpel} | ${r.tarif}/${r.daya} | ${r.alamat || '-'}</p>
      <div class="d-flex justify-content-between align-items-center">
        <b class="text-danger">Rp ${parseIDR(r.jumlah).toLocaleString("id-ID")}</b>
        <div class="d-flex gap-1">
          <a class="btn btn-success btn-sm" target="_blank" href="https://wa.me/?text=${getFullText(r, 'WA')}">📤 WA</a>
          <button class="btn btn-danger btn-sm" onclick='createPDF(${JSON.stringify(r)})'>📄 PDF</button>
        </div>
      </div>
    </div></div>`;
  });
  view.innerHTML = h;
  if(id) setTimeout(() => document.getElementById(`card-${id}`).scrollIntoView({behavior:'smooth', block:'center'}), 100);
}

/* WA & PDF */
const getFullText = (r, type) => {
  const date = new Date();
  const nBulanFull = ["JANUARI", "FEBRUARI", "MARET", "APRIL", "MEI", "JUNI", "JULI", "AGUSTUS", "SEPTEMBER", "OKTOBER", "NOVEMBER", "DESEMBER"];
  const nBulanShort = ["JAN", "FEB", "MAR", "APR", "MEI", "JUN", "JUL", "AGU", "SEP", "OKT", "NOP", "DES"];
  const blnIniFull = nBulanFull[date.getMonth()];
  const blnIni = `${nBulanShort[date.getMonth()]}-${date.getFullYear()}`;
  const blnLalu = date.getMonth() === 0 ? `DES-${date.getFullYear()-1}` : `${nBulanShort[date.getMonth()-1]}-${date.getFullYear()}`;
  
  if (currentSheet === 'invoice') {
    if (type === 'WA') {
      return encodeURIComponent("*PT. PLN (PERSERO) UID JAWA TENGAH DAN DIY*\n*UP3 KLATEN*\n*ULP TULUNG*\n\n*PEMBERITAHUAN TAGIHAN LISTRIK*\n==========================================\nPelanggan setia PLN,\n*Nama* : " + r.nama + "\n*GarduTiang* : " + (r.gardu || '-') + "\n*Idpel* : " + r.idpel + "\n*Koked* : " + r.koked + "\n*Alamat* : " + (r.alamat || '-') + "\n*Tarif / Daya* : " + r.tarif + " / " + r.daya + "\n*No. Kwh* : " + (r.no_kwh || '-') + "\n\nBersama ini kami sampaikan bahwa Jumlah Total tagihan listrik bulan *" + blnIniFull + " " + date.getFullYear() + "* adalah *" + parseIDR(r.jumlah).toLocaleString("id-ID") + "*.\n\nAgar terhindar dari pemutusan aliran listrik, kami berharap agar tagihan di atas segera dilunasi.\nBatas akhir pembayaran tagihan listrik adalah tanggal 20 setiap bulannya & hari libur transaksi masih bisa dilakukan pada Loket-loket PPOB online.\n\nApabila sampai dengan batas waktu yang ditentukan, tanggal 20 belum lunas, maka akan dilakukan pemutusan aliran listrik.\nDemikian atas perhatian dan kerjasamanya diucapkan terimakasih.\n\nTulung, " + date.getDate() + " " + blnIniFull + " " + date.getFullYear() + "\n\n*BAYARLAH LISTRIK TANGGAL 1-15 SETIAP BULANNYA*\n*PASTI NYAMAN SEMUA SENANG*\n\n*MARTONO AJI PRABOWO*\n\n_ABAIKAN PEMBERITAHUAN INI JIKA SUDAH MEMBAYAR TAGIHAN_");

    }
    return { periode, blnIni, body1, body2, body3, tgl: `${date.getDate()} ${nBulanFull[date.getMonth()]} ${date.getFullYear()}` };
  }
};
