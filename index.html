<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Rekap Tunggakan ULP Tulung</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
    body{background:#f4f6f9; font-family: sans-serif;}
    .clickable{cursor:pointer; user-select: none;}

    /* --- PERBAIKAN WARNA ZEBRA (SELANG-SELING) --- */
    /* Menghapus pengaruh striped bawaan bootstrap */
    .table-custom tbody tr:nth-of-type(odd) {
        background-color: #ffffff !important;
    }
    .table-custom tbody tr:nth-of-type(even) {
        background-color: #f2f7fb !important; /* Warna abu-abu kebiruan lembut */
    }
    /* Warna khusus baris SEMUA */
    .row-semua {
        background-color: #e0f7fa !important;
        font-weight: bold;
    }
    #view table tbody tr:hover {
        background-color: #d1e7ff !important;
    }

    .header-rekap th { vertical-align: middle; text-align: center; font-size: 0.8rem; border: 1px solid #dee2e6; }
    .bg-belum { background-color: #dc3545 !important; color: white; }
    .bg-lunas { background-color: #198754 !important; color: white; }
    .bg-total { background-color: #0d6efd !important; color: white; }
    .card.highlight { border: 2px solid #0d6efd; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    .card-body p { margin-bottom: 2px; line-height: 1.2; font-size: 0.85rem; }
</style>
</head>
<body>
<div class="container my-3">
    <ul class="nav nav-tabs mb-3">
      <li class="nav-item"><a class="nav-link active" id="tab-lembar1" onclick="loadSheet('lembar1')">Lembar 1</a></li>
      <li class="nav-item"><a class="nav-link" id="tab-lembar2" onclick="loadSheet('lembar2')">Lembar 2</a></li>
      <li class="nav-item"><a class="nav-link" id="tab-lembar3" onclick="loadSheet('lembar3')">Lembar 3</a></li>
    </ul>
    <h4 class="text-center text-primary mb-3">⚡ Rekap Tunggakan ULP Tulung</h4>
    <button id="backBtn" class="btn btn-secondary btn-sm mb-2 d-none">⬅ Kembali</button>
    <div id="view"></div>
</div>

<script>
const { jsPDF } = window.jspdf;
const SHEETS = {
  lembar1: {url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vR0oO36v0vrge07HwX1zLsrGfuUxElZ3becef4DFHLNxsz2Lrohya5oThpvmkjzsNBF3_9hSdq0q4Ko/pub?gid=354207978&single=true&output=csv"},
  lembar2: {url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vR0oO36v0vrge07HwX1zLsrGfuUxElZ3becef4DFHLNxsz2Lrohya5oThpvmkjzsNBF3_9hSdq0q4Ko/pub?gid=311394824&single=true&output=csv"},
  lembar3: {url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vR0oO36v0vrge07HwX1zLsrGfuUxElZ3becef4DFHLNxsz2Lrohya5oThpvmkjzsNBF3_9hSdq0q4Ko/pub?gid=654408403&single=true&output=csv"}
};

let allData = [], currentDetail = [], currentTitle = "", currentPetugas = "Semua", currentSheet = "lembar1";
let historyStack = [];

const parseIDR = (v) => {
  if (!v) return 0;
  let n = String(v).replace(/[^0-9,-]/g, '').split(',')[0];
  return parseFloat(n) || 0;
};

const isLunas = r => {
  if (!r.tgl_lunas) return false;
  const s = r.tgl_lunas.trim().toUpperCase();
  return s !== "BELUMLUNAS" && s !== "" && s !== "-";
};

// --- LOGIKA WA & PDF SESUAI DATA TEKNIS ---
const getFullText = (r, type) => {
  const d = new Date();
  const nBulanFull = ["JANUARI", "FEBRUARI", "MARET", "APRIL", "MEI", "JUNI", "JULI", "AGUSTUS", "SEPTEMBER", "OKTOBER", "NOVEMBER", "DESEMBER"];
  const nBulanShort = ["JAN", "FEB", "MAR", "APR", "MEI", "JUN", "JUL", "AGU", "SEP", "OKT", "NOP", "DES"];
  const blnIni = `${nBulanShort[d.getMonth()]}-${d.getFullYear()}`;
  const blnLalu = d.getMonth() === 0 ? `DES-${d.getFullYear()-1}` : `${nBulanShort[d.getMonth()-1]}-${d.getFullYear()}`;
  let periode = (currentSheet === 'lembar1') ? `${blnIni} s/d ${blnIni}` : `${blnLalu} s/d ${blnIni}`;
  
  const b1 = "Dengan ini diberitahukan dengan hormat bahwa pada hari ini aliran listrik di rumah/alamat seperti tersebut diatas terpaksa diputus untuk sementara karena rekening listrik belum dilunasi pada waktu yang telah ditetapkan.";
  const b3 = "Apabila dalam jangka waktu 60 hari terhitung sejak dilakukan pemutusan sementara tunggakan belum dilunasi, maka instalasi milik PLN akan dibongkar.";

  if (type === 'WA') {
    return encodeURIComponent("*PT. PLN (PERSERO) ULP TULUNG*\n*PEMBERITAHUAN PEMUTUSAN SEMENTARA*\n\n*Nama* : " + r.nama + "\n*IDPEL* : " + r.idpel + "\n*Alamat* : " + (r.alamat || '-') + "\n*Tarip/Daya* : " + r.tarif + "/" + r.daya + "\n\n*Rekening* : " + periode + "\n*Total Rp* : *" + parseIDR(r.jumlah).toLocaleString("id-ID") + "*\n\n" + b1 + "\n\n" + b3);
  }
  return { periode, blnIni, b1, b3, tgl: `${d.getDate()} ${nBulanFull[d.getMonth()]} ${d.getFullYear()}` };
};

function createPDF(r) {
  const doc = new jsPDF();
  const info = getFullText(r, 'PDF');
  doc.setFontSize(8); doc.text("PT. PLN (PERSERO) ULP TULUNG", 15, 15);
  doc.setFont(undefined, 'bold'); doc.setFontSize(10);
  doc.text("PEMBERITAHUAN PELAKSANAAN PEMUTUSAN SEMENTARA", 105, 30, {align: "center"});
  doc.setFont(undefined, 'normal'); doc.setFontSize(9);
  doc.text(`ID Pelanggan : ${r.idpel}`, 15, 45);
  doc.text(`Nama         : ${r.nama}`, 15, 50);
  doc.text(`Tarip / Daya : ${r.tarif} / ${r.daya}`, 15, 55);
  doc.text(`Alamat       : ${r.alamat || '-'}`, 15, 60);
  doc.text(`Total Tagihan: Rp ${parseIDR(r.jumlah).toLocaleString("id-ID")}`, 15, 70);
  doc.text(doc.splitTextToSize(info.b1, 180), 15, 85);
  doc.text(`Tulung, ${info.tgl}`, 140, 120);
  doc.text("MANAGER", 150, 125);
  doc.text("MARTONO AJI PRABOWO", 140, 145);
  doc.save(`TUL_${r.idpel}.pdf`);
}

function loadSheet(k) {
  currentSheet = k; historyStack = [];
  document.querySelectorAll(".nav-link").forEach(t => t.classList.remove("active"));
  document.getElementById("tab-" + k).classList.add("active");
  fetch(SHEETS[k].url + "&t=" + new Date().getTime()).then(r => r.text()).then(csv => {
    allData = Papa.parse(csv, {header: true, skipEmptyLines: true}).data;
    renderPetugas();
  });
}

function pushView(fn) { historyStack.push(fn); backBtn.classList.remove("d-none"); }
backBtn.onclick = () => {
  if (historyStack.length > 0) historyStack.pop()();
  if (historyStack.length === 0) { backBtn.classList.add("d-none"); renderPetugas(); }
};

function renderPetugas() {
  const map = {};
  let tot = { bP: 0, bR: 0, lP: 0, lR: 0, tP: 0, tR: 0 };
  allData.forEach(r => {
    let p = r.petugas || "Tanpa Nama";
    if (!map[p]) map[p] = { bP: 0, bR: 0, lP: 0, lR: 0, tP: 0, tR: 0 };
    let rp = parseIDR(r.jumlah);
    if (isLunas(r)) { map[p].lP++; map[p].lR += rp; tot.lP++; tot.lR += rp; } 
    else { map[p].bP++; map[p].bR += rp; tot.bP++; tot.bR += rp; }
    map[p].tP++; map[p].tR += rp; tot.tP++; tot.tR += rp;
  });
  let h = `<div class="table-responsive"><table class="table table-bordered table-sm text-center table-custom" style="font-size:0.8rem">
    <thead class="table-dark header-rekap">
      <tr><th rowspan="2">Petugas</th><th colspan="2" class="bg-belum">Belum Lunas</th><th colspan="2" class="bg-lunas">Lunas</th><th colspan="2" class="bg-total">Total</th></tr>
      <tr><th class="bg-belum">Plg</th><th class="bg-belum">Rp</th><th class="bg-lunas">Plg</th><th class="bg-lunas">Rp</th><th class="bg-total">Plg</th><th class="bg-total">Rp</th></tr>
    </thead><tbody>
    <tr class="clickable row-semua" onclick="openGlobal()"><td>SEMUA</td><td>${tot.bP}</td><td class="text-end pe-2">${tot.bR.toLocaleString("id-ID")}</td><td>${tot.lP}</td><td class="text-end pe-2">${tot.lR.toLocaleString("id-ID")}</td><td>${tot.tP}</td><td class="text-end pe-2">${tot.tR.toLocaleString("id-ID")}</td></tr>`;
  Object.keys(map).sort().forEach(p => { 
    const d = map[p]; 
    h += `<tr class="clickable" onclick="openPetugas('${p}')"><td class="text-start ps-2">${p}</td><td>${d.bP}</td><td class="text-end pe-2">${d.bR.toLocaleString("id-ID")}</td><td>${d.lP}</td><td class="text-end pe-2">${d.lR.toLocaleString("id-ID")}</td><td>${d.tP}</td><td class="text-end pe-2">${d.tR.toLocaleString("id-ID")}</td></tr>`; 
  });
  view.innerHTML = h + `</tbody></table></div>`;
}

function openPetugas(p) {
  currentPetugas = p; pushView(renderPetugas);
  const data = allData.filter(r => r.petugas === p), lunas = data.filter(isLunas), belum = data.filter(r => !isLunas(r)), byDate = {};
  lunas.forEach(r => { byDate[r.tgl_lunas] = byDate[r.tgl_lunas] || {j: 0, rp: 0}; byDate[r.tgl_lunas].j++; byDate[r.tgl_lunas].rp += parseIDR(r.jumlah); });
  let h = `<h6 class="text-primary fw-bold">Petugas: ${p}</h6><div class="table-responsive"><table class="table table-sm table-bordered table-custom"><thead><tr class="table-success"><th>Tanggal</th><th>Plg</th><th>Total Rp</th></tr></thead><tbody>`;
  if (belum.length > 0) h += `<tr class="clickable" onclick="detailBelum()"><td>BELUMLUNAS</td><td>${belum.length}</td><td class="text-end pe-2">${belum.reduce((a,b)=>a+parseIDR(b.jumlah),0).toLocaleString("id-ID")}</td></tr>`;
  Object.keys(byDate).sort((a,b) => b.localeCompare(a)).forEach(t => { h += `<tr class="clickable" onclick="detailLunas('${t}')"><td>${t}</td><td>${byDate[t].j}</td><td class="text-end pe-2">${byDate[t].rp.toLocaleString("id-ID")}</td></tr>`; });
  view.innerHTML = h + `</tbody></table></div>`;
}

function openGlobal() {
  currentPetugas = "Semua"; pushView(renderPetugas);
  const lunas = allData.filter(isLunas), belum = allData.filter(r => !isLunas(r)), byDate = {};
  lunas.forEach(r => { byDate[r.tgl_lunas] = byDate[r.tgl_lunas] || {j: 0, rp: 0}; byDate[r.tgl_lunas].j++; byDate[r.tgl_lunas].rp += parseIDR(r.jumlah); });
  let h = `<h6 class="text-primary fw-bold">Semua Petugas</h6><div class="table-responsive"><table class="table table-sm table-bordered table-custom"><thead><tr class="table-success"><th>Tanggal</th><th>Plg</th><th>Total Rp</th></tr></thead><tbody>`;
  if (belum.length > 0) h += `<tr class="clickable" onclick="detailBelum()"><td>BELUMLUNAS</td><td>${belum.length}</td><td class="text-end pe-2">${belum.reduce((a,b)=>a+parseIDR(b.jumlah),0).toLocaleString("id-ID")}</td></tr>`;
  Object.keys(byDate).sort((a,b) => b.localeCompare(a)).forEach(t => { h += `<tr class="clickable" onclick="detailGlobalLunas('${t}')"><td>${t}</td><td>${byDate[t].j}</td><td class="text-end pe-2">${byDate[t].rp.toLocaleString("id-ID")}</td></tr>`; });
  view.innerHTML = h + `</tbody></table></div>`;
}

function detailLunas(t) { currentTitle = `Lunas_${t}`; currentDetail = allData.filter(r => r.petugas === currentPetugas && isLunas(r) && r.tgl_lunas === t); pushView(()=>openPetugas(currentPetugas)); renderDetail(); }
function detailBelum() { currentTitle = "Belum_Lunas"; const p = currentPetugas; currentDetail = allData.filter(r => (p === "Semua" ? true : r.petugas === p) && !isLunas(r)); pushView(()=>(p==="Semua"?openGlobal():openPetugas(p))); renderDetail(); }
function detailGlobalLunas(t) { currentTitle = `Global_Lunas_${t}`; currentDetail = allData.filter(r => isLunas(r) && r.tgl_lunas === t); pushView(openGlobal); renderDetail(); }

function renderDetail() {
  view.innerHTML = `<h6 class="text-center fw-bold small text-uppercase mb-2">${currentTitle.replace(/_/g,' ')}</h6><div class="d-flex mb-2 gap-1"><input id="search" class="form-control form-control-sm" placeholder="Cari..."><button class="btn btn-success btn-sm" onclick="exportExcel()">XLSX</button></div><div id="tableArea"></div>`;
  document.getElementById("search").oninput = e => {
    const t = e.target.value.toLowerCase();
    drawTable(currentDetail.filter(r => Object.values(r).some(v => String(v).toLowerCase().includes(t))));
  };
  drawTable(currentDetail);
}

function drawTable(data) {
  let h = `<div class="table-responsive"><table class="table table-sm table-bordered table-custom" style="font-size:0.7rem"><thead class="table-primary text-nowrap"><tr><th>IDPEL</th><th>Nama</th><th>Koked</th><th>Rp</th></tr></thead><tbody>`;
  data.forEach(r => { h += `<tr class="clickable" onclick="showCardsByData('${r.idpel}')"><td>${r.idpel}</td><td class="text-start">${r.nama}</td><td>${r.koked}</td><td class="text-end pe-2">${parseIDR(r.jumlah).toLocaleString("id-ID")}</td></tr>`; });
  document.getElementById("tableArea").innerHTML = h + `</tbody></table></div>`;
}

function showCardsByData(id) {
  pushView(renderDetail);
  let h = "";
  currentDetail.forEach(r => {
    h += `<div class="card mb-2 ${r.idpel === id?'highlight':''}" id="card-${r.idpel}"><div class="card-body p-2">
      <div class="d-flex justify-content-between"><b>${r.nama}</b> <span class="badge bg-light text-dark">${r.koked}</span></div>
      <p class="text-muted mb-1">${r.idpel} | ${r.tarif}/${r.daya} | ${r.alamat || '-'}</p>
      <div class="d-flex justify-content-between align-items-center">
        <b class="text-danger">Rp ${parseIDR(r.jumlah).toLocaleString("id-ID")}</b>
        <div class="d-flex gap-1">
          <a class="btn btn-success btn-sm" target="_blank" href="https://wa.me/?text=${getFullText(r, 'WA')}">📤 WA</a>
          <button class="btn btn-danger btn-sm" onclick='createPDF(${JSON.stringify(r)})'>📄 PDF</button>
        </div>
      </div>
    </div></div>`;
  });
  view.innerHTML = h;
  if(id) setTimeout(() => document.getElementById(`card-${id}`).scrollIntoView({behavior:'smooth', block:'center'}), 100);
}

function exportExcel() {
  const ws = XLSX.utils.json_to_sheet(currentDetail), wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Data");
  XLSX.writeFile(wb, `Rekap_${currentTitle}.xlsx`);
}

loadSheet("lembar1");
</script>
</body>
</html>
